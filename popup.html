<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Ad Accelerator</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 14 4-4-4-4"></path>
          <path d="M4 20V10a4 4 0 0 1 4-4h8"></path>
          <polygon points="22 3 13 12 17 16 22 3"></polygon>
        </svg>
        <h1 class="title">Ad Accelerator</h1>
      </div>
      <div class="toggle-container">
        <label class="switch-label" for="enable-toggle">
          <input type="checkbox" id="enable-toggle" checked>
          <span class="slider-round"></span>
        </label>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Stats Dashboard -->
      <section class="stats-panel">
        <div class="stat-card">
          <div class="stat-icon-wrapper ads-count">
            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
          </div>
          <div class="stat-data">
            <span class="stat-value" id="ads-counter">0</span>
            <span class="stat-label">スキップした広告</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrapper time-saved">
            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="stat-data">
            <span class="stat-value" id="time-counter">0s</span>
            <span class="stat-label">節約した時間</span>
          </div>
        </div>
      </section>

      <!-- Settings Panel -->
      <section class="settings-panel">
        <h2 class="section-title">設定</h2>

        <!-- Speed Limit Slider -->
        <div class="control-group">
          <div class="control-label-row">
            <label class="control-label" for="speed-slider">再生速度 (倍速)</label>
            <span class="control-value" id="speed-value">5x</span>
          </div>
          <div class="range-slider-wrapper">
            <input type="range" id="speed-slider" min="2" max="16" step="1" value="5">
            <div class="range-ticks">
              <span>2x</span>
              <span>8x</span>
              <span>16x (Max)</span>
            </div>
          </div>
        </div>

        <!-- Checkbox Options -->
        <div class="option-row">
          <div class="option-info">
            <span class="option-title">自動ミュート</span>
            <span class="option-description">広告再生中に音声を消音します</span>
          </div>
          <label class="checkbox-switch" for="mute-checkbox">
            <input type="checkbox" id="mute-checkbox" checked>
            <span class="checkbox-slider"></span>
          </label>
        </div>

        <div class="option-row">
          <div class="option-info">
            <span class="option-title">自動スキップ</span>
            <span class="option-description">スキップボタンを自動でクリックします</span>
          </div>
          <label class="checkbox-switch" for="skip-checkbox">
            <input type="checkbox" id="skip-checkbox" checked>
            <span class="checkbox-slider"></span>
          </label>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <button class="btn-reset" id="reset-stats-btn" title="統計データをリセット">
        <svg class="reset-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
          <path d="M3 3v5h5"></path>
        </svg>
        統計をリセット
      </button>
      <span class="version-text">v1.0.1</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
